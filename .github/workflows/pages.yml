name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml markdown

      - name: Regenerate root index
        run: python3 scripts/harness.py render-index

      - name: Re-render all reports (defensive)
        run: |
          set -e
          for d in reports/*/; do
            [ -f "$d/meta.yaml" ] || continue
            [ -f "$d/draft.md" ] || continue
            slug="$(basename "$d")"
            python3 scripts/harness.py render-report "$slug"
          done

      - name: Stage site artefact
        run: |
          mkdir -p _site
          cp -R assets _site/
          cp -R reports _site/ 2>/dev/null || mkdir -p _site/reports
          cp index.html _site/
          cp .nojekyll _site/ 2>/dev/null || touch _site/.nojekyll

      - name: Upload artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
